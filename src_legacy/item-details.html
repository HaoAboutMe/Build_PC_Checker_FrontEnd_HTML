<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết linh kiện - Build PC Support</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/item-details.css">
    <link rel="stylesheet" href="css/toast.css">
</head>
<body>
    <div class="details-page">
        <div class="bg-blur-1"></div>
        <div class="bg-blur-2"></div>

        <!-- Header -->
        <header class="main-header">
            <div class="container header-content">
                <div class="logo">
                    <a href="home.html" style="text-decoration: none; color: inherit;">
                        <h1 class="logo-text">Build PC Support</h1>
                    </a>
                </div>
                <nav class="breadcrumb">
                    <a href="home.html">Trang chủ</a>
                    <span>/</span>
                    <a id="breadcrumb-cat" href="home.html">Linh kiện</a>
                    <span>/</span>
                    <span id="breadcrumb-item" class="current">Chi tiết</span>
                </nav>
            </div>
        </header>

        <main class="container main-container">
            <div class="details-card">
                <div class="action-area-top">
                    <button onclick="window.location.href='home.html'" class="back-link-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        Quay lại danh sách
                    </button>
                </div>
                <div class="details-layout">
                    <!-- Left: Image -->
                    <div class="item-visual">
                        <div class="image-wrapper">
                            <img id="item-image" src="https://via.placeholder.com/400?text=PC+Part" alt="Item">
                        </div>
                    </div>

                    <!-- Center: Info -->
                    <div class="item-info">
                        <div class="info-header">
                            <span class="category-tag" id="item-category">Category</span>
                            <h2 id="item-name" class="item-title">Loading...</h2>
                            <p id="item-description" class="item-description"></p>
                        </div>
                    </div>

                    <!-- Right: Specs section -->
                    <div class="specs-section">
                        <h3 class="specs-title">Thông số kỹ thuật</h3>
                        <div class="specs-grid" id="specs-grid">
                            <!-- Specs dynamically injected here -->
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-container">
                <p>© 2026 Build PC Support. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- Script -->
    <script src="js/toast.js"></script>
    <script src="js/item-details.js"></script>
</body>
</html>
