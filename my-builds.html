<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildPC Checker - Cấu hình của tôi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="build_pc.css">
    <style>
        .my-builds-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 1.5rem 3rem;
        }

        .build-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .build-item-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .build-item-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-lg);
        }

        .build-item-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .build-item-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .build-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-light);
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        .build-item-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-delete-build {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .btn-delete-build:hover {
            background: #feb2b2;
            color: #742a2a;
        }

        /* Detail View Modal */
        .build-detail-modal-content {
            max-width: 700px;
        }

        .parts-list {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .part-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .part-item-icon {
            font-size: 1.2rem;
            width: 32px;
            text-align: center;
        }

        .part-item-info {
            flex: 1;
        }

        .part-item-type {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-light);
        }

        .part-item-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--border-radius-lg);
            border: 2px dashed var(--border-color);
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <!-- Background Animation -->
    <div class="background-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Top Nav Bar -->
    <nav class="pc-navbar">
        <div class="pc-navbar-brand">
            <svg width="36" height="36" viewBox="0 0 48 48" fill="none" xmlns="www.w3.org/2000/svg">
                <rect width="48" height="48" rx="12" fill="url(#nav-logo-gradient)" />
                <path d="M24 12L32 18V30L24 36L16 30V18L24 12Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M24 24L32 18M24 24L16 18M24 24V36" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <defs>
                    <linearGradient id="nav-logo-gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#667eea" />
                        <stop offset="1" stop-color="#764ba2" />
                    </linearGradient>
                </defs>
            </svg>
            <span class="pc-navbar-title">BuildPC Checker</span>
        </div>
        <div class="pc-navbar-actions">
            <button class="btn btn-secondary pc-nav-btn" onclick="window.location.href='index.html'">
                Cá nhân
            </button>
            <button class="btn btn-primary pc-nav-btn" onclick="window.location.href='build_pc.html'">
                + Xây dựng mới
            </button>
        </div>
    </nav>

    <div class="my-builds-container">
        <div class="build-header">
            <h1 class="build-page-title">Cấu hình của tôi</h1>
            <p class="build-page-subtitle">Danh sách các cấu hình PC bạn đã lưu.</p>
        </div>

        <div id="builds-grid" class="build-grid">
            <!-- Builds will be loaded here -->
            <div class="empty-state">
                <p>Đang tải danh sách cấu hình...</p>
            </div>
        </div>
    </div>

    <!-- Build Detail Modal -->
    <div class="modal" id="build-detail-modal">
        <div class="modal-overlay" id="build-detail-overlay"></div>
        <div class="modal-content build-detail-modal-content">
            <div class="modal-header">
                <h3 id="modal-build-name">Tên cấu hình</h3>
                <button class="modal-close" id="close-detail-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <p id="modal-build-desc" style="color: var(--text-secondary); margin-bottom: 1.5rem;"></p>
                <h4 style="font-size: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Linh kiện trong cấu hình</h4>
                <div class="parts-list" id="modal-parts-list">
                    <!-- Parts injected here -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="detail-close-btn" style="width: 100%;">Đóng</button>
            </div>
        </div>
    </div>

    <script src="my-builds.js"></script>
</body>

</html>
