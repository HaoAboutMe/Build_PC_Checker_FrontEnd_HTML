<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildPC Checker - Quản lý Linh kiện PC</title>
    <meta name="description" content="Trang quản trị CRUD linh kiện PC - CPU, Mainboard, RAM, VGA, PSU, Cooler, Case, SSD, HDD">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin_pcparts.css">
</head>

<body>
    <!-- Background Animation -->
    <div class="background-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Top Nav Bar -->
    <nav class="pc-navbar" id="pc-navbar">
        <div class="pc-navbar-brand">
            <svg width="36" height="36" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="48" height="48" rx="12" fill="url(#nav-logo-gradient)" />
                <path d="M24 12L32 18V30L24 36L16 30V18L24 12Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M24 24L32 18M24 24L16 18M24 24V36" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <defs>
                    <linearGradient id="nav-logo-gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#667eea" />
                        <stop offset="1" stop-color="#764ba2" />
                    </linearGradient>
                </defs>
            </svg>
            <span class="pc-navbar-title">BuildPC Checker</span>
            <span class="pc-navbar-badge">Admin</span>
        </div>
        <div class="pc-navbar-actions">
            <span class="pc-navbar-user" id="navbar-username">Loading...</span>
            <button class="btn btn-secondary pc-nav-btn" id="back-to-main-btn" onclick="window.location.href='index.html'">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                    <path d="M15.8333 10H4.16667M4.16667 10L10 15.8333M4.16667 10L10 4.16667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Quay lại
            </button>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="pc-layout" id="pc-layout">
        <!-- Sidebar -->
        <aside class="pc-sidebar" id="pc-sidebar">
            <div class="pc-sidebar-section">
                <p class="pc-sidebar-label">⚙️ Linh kiện chính</p>
                <button class="pc-sidebar-btn active" data-part="cpu" id="sidebar-cpu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M9 9h6v6H9z" stroke="currentColor" stroke-width="1.5"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    CPU
                </button>
                <button class="pc-sidebar-btn" data-part="mainboard" id="sidebar-mainboard">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="6" y="8" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="8" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M6 14h12M6 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Mainboard
                </button>
                <button class="pc-sidebar-btn" data-part="ram" id="sidebar-ram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 7V5M9 7V5M12 7V5M15 7V5M18 7V5M6 17v2M9 17v2M12 17v2M15 17v2M18 17v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    RAM
                </button>
                <button class="pc-sidebar-btn" data-part="vga" id="sidebar-vga">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="20" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="14" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M18 9h2M18 15h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    VGA
                </button>
                <button class="pc-sidebar-btn" data-part="psu" id="sidebar-psu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M13 8l-4 4h3l-2 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    PSU
                </button>
                <button class="pc-sidebar-btn" data-part="cooler" id="sidebar-cooler">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Cooler
                </button>
                <button class="pc-sidebar-btn" data-part="case" id="sidebar-case">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 14h8M8 17h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    PC Case
                </button>
                <button class="pc-sidebar-btn" data-part="ssd" id="sidebar-ssd">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 10h2M7 14h2M13 10h4M13 14h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    SSD
                </button>
                <button class="pc-sidebar-btn" data-part="hdd" id="sidebar-hdd">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="17" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 9h6M7 12h4M7 15h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    HDD
                </button>
            </div>

            <div class="pc-sidebar-section">
                <p class="pc-sidebar-label">🎮 Quản lý Game</p>
                <button class="pc-sidebar-btn" data-part="game" id="sidebar-game">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12h4M8 10v4M15 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
                    Quản lý Game
                </button>
            </div>

            <div class="pc-sidebar-section">
                <p class="pc-sidebar-label">🔗 Lookup Entities</p>
                <button class="pc-sidebar-btn" data-part="socket" id="sidebar-socket">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="7" y="7" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v3M14 2v3M10 19v3M14 19v3M2 10h3M2 14h3M19 10h3M19 14h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Socket
                </button>
                <button class="pc-sidebar-btn" data-part="ram-type" id="sidebar-ram-type">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="9" width="20" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M6 9V7M9 9V7M12 9V7M6 15v2M9 15v2M12 15v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    RAM Type
                </button>
                <button class="pc-sidebar-btn" data-part="pcie-version" id="sidebar-pcie-version">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6l9-4 9 4M3 18l9 4 9-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    PCIe Version
                </button>
                <button class="pc-sidebar-btn" data-part="pcie-connector" id="sidebar-pcie-connector">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 7h10v2H7zM7 11h10v2H7zM7 15h6v2H7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    PCIe Connector
                </button>
                <button class="pc-sidebar-btn" data-part="case-size" id="sidebar-case-size">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 9h16M9 4v16" stroke="currentColor" stroke-width="1.5"/></svg>
                    Case Size
                </button>
                <button class="pc-sidebar-btn" data-part="cooler-type" id="sidebar-cooler-type">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Cooler Type
                </button>
                <button class="pc-sidebar-btn" data-part="form-factor" id="sidebar-form-factor">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="7" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 7V5M17 7V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Form Factor
                </button>
                <button class="pc-sidebar-btn" data-part="interface-type" id="sidebar-interface-type">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 10h16M4 14h10M4 18h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Interface Type
                </button>
                <button class="pc-sidebar-btn" data-part="ssd-type" id="sidebar-ssd-type">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="8" width="16" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 12h16M8 8V6M16 8V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    SSD Type
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="pc-main" id="pc-main">
            <!-- Page Header -->
            <div class="pc-page-header">
                <div class="pc-page-title-wrap">
                    <h1 class="pc-page-title" id="page-title">CPU</h1>
                    <p class="pc-page-subtitle" id="page-subtitle">Quản lý danh sách CPU trong hệ thống</p>
                </div>
                <button class="btn btn-primary pc-create-btn" id="create-btn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M10 5V15M5 10H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    Thêm mới
                </button>
            </div>

            <!-- Search Bar -->
            <div class="pc-search-bar">
                <div class="pc-search-input-wrap">
                    <svg class="pc-search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M17.5 17.5L13.875 13.875M15.8333 9.16667C15.8333 12.8486 12.8486 15.8333 9.16667 15.8333C5.48477 15.8333 2.5 12.8486 2.5 9.16667C2.5 5.48477 5.48477 2.5 9.16667 2.5C12.8486 2.5 15.8333 5.48477 15.8333 9.16667Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <input type="text" id="search-input" class="pc-search-input" placeholder="Tìm kiếm theo tên...">
                </div>
                <button class="btn btn-secondary pc-refresh-btn" id="refresh-btn" title="Làm mới">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <path d="M4.16667 10C4.16667 6.77834 6.77834 4.16667 10 4.16667C11.9289 4.16667 13.6466 5.07333 14.7553 6.5M15.8333 10C15.8333 13.2217 13.2217 15.8333 10 15.8333C8.07111 15.8333 6.35337 14.9267 5.24466 13.5M14.1667 6.5H17.5V3.16667M2.5 13.5L5.83333 16.8333V13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Làm mới
                </button>
            </div>

            <!-- Table Container -->
            <div class="pc-table-container">
                <div class="pc-table-wrap">
                    <table class="pc-table" id="parts-table">
                        <thead id="parts-table-head">
                            <tr>
                                <th style="cursor: pointer; user-select: none;" onclick="sortByName()" title="Sắp xếp theo tên">
                                    <div style="display: flex; align-items: center; gap: 0.25rem;">
                                        Tên
                                        <svg id="sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M7 15l5 5 5-5"></path>
                                            <path d="M7 9l5-5 5 5"></path>
                                        </svg>
                                    </div>
                                </th>
                                <th>Thông tin</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="parts-table-body">
                            <tr>
                                <td colspan="3" class="loading-row">
                                    <div class="pc-spinner"></div>
                                    Đang tải...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pc-table-footer">
                    <span id="table-count" class="pc-table-count">0 mục</span>
                </div>
            </div>
        </main>
    </div>

    <!-- ========================
         MODAL: CREATE / EDIT PART
         ======================== -->
    <div class="modal" id="part-modal">
        <div class="modal-overlay" id="part-modal-overlay"></div>
        <div class="modal-content modal-content-lg" id="part-modal-content">
            <div class="modal-header">
                <h3 id="part-modal-title">Thêm CPU</h3>
                <button class="modal-close" id="close-part-modal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <!-- Dynamic form injected here -->
            <form id="part-form">
                <input type="hidden" id="part-id">
                <div id="part-form-fields"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-part-btn">Hủy</button>
                    <button type="submit" class="btn btn-primary" id="save-part-btn">
                        <span class="btn-text">Lưu</span>
                        <span class="btn-loader"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ========================
         MODAL: DELETE CONFIRM
         ======================== -->
    <div class="modal" id="delete-modal">
        <div class="modal-overlay" id="delete-modal-overlay"></div>
        <div class="modal-content modal-content-sm">
            <div class="modal-header">
                <h3>Xác nhận xóa</h3>
                <button class="modal-close" id="close-delete-modal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <div class="delete-confirm-body">
                <div class="delete-icon-wrap">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                        <path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="#f56565" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <p id="delete-confirm-text">Bạn có chắc chắn muốn xóa mục này không?</p>
                <p class="delete-confirm-note">Hành động này không thể hoàn tác.</p>
            </div>
            <input type="hidden" id="delete-item-id">
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancel-delete-btn">Hủy</button>
                <button type="button" class="btn btn-danger" id="confirm-delete-btn">
                    <span class="btn-text">Xóa</span>
                    <span class="btn-loader"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <div class="toast-icon" id="toast-icon"></div>
        <div class="toast-content">
            <span class="toast-title" id="toast-title">Notification</span>
            <span class="toast-message" id="toast-message">Message</span>
        </div>
        <button class="toast-close" id="toast-close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M12 4L4 12M4 4L12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </button>
    </div>

    <!-- Auth Guard: Redirect if not logged in -->
    <script>
        (function () {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
            }
        })();
    </script>
    <script src="admin_pcparts.js"></script>
</body>

</html>
