<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối - 403 Forbidden</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0061ff;
            --primary-dark: #004ecc;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-400: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--slate-900);
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            position: relative;
        }

        .error-code {
            font-family: 'Manrope', sans-serif;
            font-size: 160px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -5px;
            filter: drop-shadow(0 10px 10px rgba(0,97,255,0.1));
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--slate-900);
        }

        p {
            font-size: 16px;
            color: var(--slate-600);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .illustration {
            width: 300px;
            margin: 0 auto 40px;
            opacity: 0.9;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,97,255,0.2);
        }

        .back-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,97,255,0.3);
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            opacity: 0.3;
            border-radius: 50%;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: #0061ff;
            top: -150px;
            right: -150px;
        }

        .shape-2 {
            width: 250px;
            height: 250px;
            background: #60efff;
            bottom: -100px;
            left: -100px;
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="error-container">
        <div class="error-code">403</div>
        <h1>Truy cập bị từ chối</h1>
        <p>Rất tiếc, bạn không có quyền hạn để truy cập vào trang quản trị này. Nếu bạn tin rằng đây là một sự nhầm lẫn, vui lòng liên hệ với quản trị viên hệ thống.</p>
        
        <a href="home.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Quay lại Trang Chủ
        </a>
    </div>
</body>
</html>
